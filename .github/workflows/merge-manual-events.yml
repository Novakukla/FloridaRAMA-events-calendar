name: Merge manual events

on:
  push:
    branches: [ main ]

jobs:
  merge-manual:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci || true

      - name: Run merge script
        run: node ./scripts/merge_manual_events.mjs

      - name: Commit manual-events.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet --exit-code manual-events.json; then
            git add manual-events.json
            git commit -m "Build manual-events.json from manual-events/ [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to manual-events.json"
          fi
