<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <link rel="stylesheet" href="shared.css" />
  <style>
    #fr-events-calendar { max-width: 1200px; margin: 0 auto; min-height: 800px; }
    .fc-scrollgrid { border: none; }
    .fc-daygrid-day-frame {
      min-height: 130px; background-color: #fffdf7; border: none;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); border-radius: 8px; padding: 2px;
    }
    .fc-daygrid-day-number { font-weight: 600; color: var(--brand-green); margin: 2px; }
    .fc-daygrid-day-events { max-height: none !important; width: 100%; box-sizing: border-box; }
    .fc-daygrid-event-harness { height: auto !important; margin-bottom: 4px; }
    .fc-daygrid-event {
      width: 100%; max-width: 100%; box-sizing: border-box; margin: 0;
      height: auto !important; white-space: normal; padding: 0; overflow: hidden;
      border-radius: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    }
    .fr-event-card {
      display: flex; flex-direction: column; font-size: 11px;
      color: #fff; width: 100%; box-sizing: border-box; min-height: 200px;
    }
    .fr-event-card img { width: 100%; height: 150px; object-fit: cover; display: block; }
    .fr-event-title { padding: 6px; font-weight: 600; font-size: 15px; }
  </style>
</head>
<body>
  <div id="fr-events-calendar"></div>
  <script>
    const event = {
      id: 'range-test',
      title: 'Celebrate Memorial Day Weekend at FloridaRAMA',
      start: '2026-05-22',
      end: '2026-05-26',
      allDay: true,
      thumbnail: 'https://static.wixstatic.com/media/400eb0_9eb7aa59a2ca442f8eac68de6e3abd21~mv2.webp'
    };

    const calendar = new FullCalendar.Calendar(document.getElementById('fr-events-calendar'), {
      initialView: 'dayGridMonth',
      initialDate: '2026-05-01',
      height: 'auto',
      events: [event],
      eventContent: function (info) {
        const container = document.createElement('div');
        container.className = 'fr-event-card';
        container.style.background = 'linear-gradient(135deg, #36a8de 0%, #36a8de 80%, rgba(255,255,255,0.15) 100%)';

        const img = document.createElement('img');
        img.src = info.event.extendedProps.thumbnail;
        img.alt = info.event.title;
        container.appendChild(img);

        const title = document.createElement('div');
        title.className = 'fr-event-title';
        title.textContent = info.event.title;
        container.appendChild(title);

        return { domNodes: [container] };
      }
    });
    calendar.render();
  </script>
</body>
</html>
