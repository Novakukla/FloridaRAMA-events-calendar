<!-- FloridaRAMA calendar -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

  <!-- fun display font -->
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* brand colors */
    :root
    {
      --brand-pink: #ef779f;
      --brand-blue: #36a8de;
      --brand-green: #3db489;
      --brand-yellow: #f8c964;
      --brand-orange: #f47948;
    }
    /* base layout */
    body
    {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Baloo 2', sans-serif;
      font-size: large;
      color: #333;
    }

    /* allow page to scroll for grid + calendar */
    html, body
    {
      height: auto;
      overflow: auto;
      -ms-overflow-style: none; /* old IE/Edge */
      scrollbar-width: none; /* firefox */
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    .fc-scroller::-webkit-scrollbar
    {
      width: 0;
      height: 0;
      display: none;
    }

    .fc-scroller
    {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    #fr-events-calendar { max-width: 100%; margin: 0 auto; min-height: 800px; }

    /* ── Featured Events Grid ── */
    .fr-featured-heading
    {
      text-align: center;
      font-family: 'Baloo 2', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #fff;
      margin: 0;
      padding: 24px 0 16px;
      letter-spacing: 2px;
    }

    .fr-featured-grid
    {
      display: flex;
      gap: 20px;
      padding: 0 20px 30px;
      max-width: 1600px;
      margin: 0 auto;
      justify-content: center;
      flex-wrap: wrap;
    }

    .fr-featured-card
    {
      flex: 1 1 calc(33.333% - 14px);
      max-width: calc(33.333% - 14px);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .fr-featured-card:hover
    {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .fr-featured-card-img
    {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }

    .fr-featured-card-body
    {
      padding: 12px 14px;
      color: #fff;
      font-family: 'Baloo 2', sans-serif;
    }

    .fr-featured-card-title
    {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 4px;
      line-height: 1.3;
    }

    .fr-featured-card-price
    {
      display: inline-block;
      background: var(--brand-blue);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin-right: 6px;
    }

    .fr-featured-card-subtitle
    {
      font-size: 0.82rem;
      opacity: 0.85;
      margin-top: 2px;
      line-height: 1.4;
    }

    .fr-featured-card-btn
    {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: var(--brand-pink);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .fr-featured-card-btn:hover
    {
      background: var(--brand-orange);
    }

    @media (max-width: 600px)
    {
      .fr-featured-grid { flex-direction: column; align-items: center; }
      .fr-featured-card { max-width: 95%; }
      .fr-featured-card-img { aspect-ratio: 16 / 9; }
    }

    /* only show this if loading fails */
    #fr-debug { display: none; }

    /* day cells */
    .fc-daygrid-day-frame
    {
      min-height: 130px; /* card space */
      background-color: #fffdf7;
      border: none;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
      border-radius: 8px;
      padding: 2px;
    }

    .fc-scrollgrid
    {
      border: none;
    }

    .fc-daygrid-day-number
    {
      font-weight: 600;
      color: var(--brand-green);
      margin: 2px;
    }
    /* events in grid */
    .fc-daygrid-day-events
    {
      max-height: none !important;
    }

    .fc-daygrid-event-harness
    {
      height: auto !important;
      margin-bottom: 4px;
    }

    .fc-daygrid-event
    {
      height: auto !important;
      white-space: normal;
      padding: 0;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .fc-daygrid-event:hover
    {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    .fc-daygrid-day-events,
    .fc-daygrid-event-harness,
    .fc-daygrid-event
    {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      margin: 0;
    }
    /* event card content */
    .fr-event-card
    {
      display: flex;
      flex-direction: column;
      font-size: 11px;
      color: #fff;
      width: 100%;
      box-sizing: border-box;
      min-height: 200px;
    }

    .fr-event-card img
    {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .fr-event-title
    {
      padding: 6px;
      font-weight: 600;
      font-size: 15px;
    }

    .fr-event-time
    {
      padding: 0 6px 6px;
      font-size: 12px;
      opacity: 0.9;
    }
    /* highlight today */
    .fc-day-today .fc-daygrid-day-frame
    {
      background: linear-gradient(135deg, rgba(248,201,100,0.35), #fffdf7);
      box-shadow:
        0 0 0 2px rgba(248,201,100,0.9),
        inset 0 0 0 1px rgba(0,0,0,0.06);
    }

    .fc-day-today .fc-daygrid-day-number
    {
      color: var(--brand-pink);
      font-weight: 700;
    }
    /* mobile: image-only cards */
    @media (max-width: 600px)
    {
      .fc-daygrid-day-frame { min-height: auto; padding: 2px; }

      .fc-daygrid-day-events { max-height: none !important; }

      .fc-daygrid-event-harness { height: auto !important; }

      .fc-daygrid-event { height: auto !important; }

      .fr-event-title, .fr-event-time { display: none; }

      .fr-event-card
      {
        aspect-ratio: 1 / 1;
        padding: 0;
        min-height: 0;
      }

      .fr-event-card img
      {
        width: 100%;
        height: 100%;
        max-height: none;
        object-fit: cover;
        display: block;
      }
    }

    /* ── Event Detail Modal ── */
    .fr-modal-overlay
    {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      min-height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 10000;
      justify-content: flex-start;
      align-items: center;
      padding: 30px 20px;
      flex-direction: column;
    }

    .fr-modal-overlay.open
    {
      display: flex;
    }

    .fr-modal
    {
      background: #fff;
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      position: relative;
      animation: frModalIn 0.25s ease;
    }

    @keyframes frModalIn
    {
      from { opacity: 0; transform: scale(0.92) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .fr-modal-close
    {
      position: absolute;
      top: 12px;
      right: 14px;
      background: rgba(0,0,0,0.45);
      border: none;
      color: #fff;
      font-size: 1.3rem;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: background 0.2s;
    }

    .fr-modal-close:hover { background: rgba(0,0,0,0.7); }

    .fr-modal img
    {
      width: 100%;
      border-radius: 16px 16px 0 0;
      display: block;
    }

    .fr-modal-body
    {
      padding: 20px 24px 24px;
    }

    .fr-modal-title
    {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #2d1b4e;
      margin: 0 0 6px;
    }

    .fr-modal-meta
    {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.95rem;
      color: #5c3d91;
      margin-bottom: 14px;
    }

    .fr-modal-desc
    {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1rem;
      color: #444;
      line-height: 1.6;
      white-space: pre-line;
    }
  </style>
</head>

<body>
  <h2 class="fr-featured-heading">Upcoming Events</h2>
  <div id="fr-featured-grid" class="fr-featured-grid"></div>
  <div id="fr-events-calendar"></div>
  <div id="fr-debug" style="font-size:12px;padding:6px 8px;color:#333;"></div>

  <!-- Event detail modal -->
  <div id="fr-modal-overlay" class="fr-modal-overlay">
    <div class="fr-modal">
      <button class="fr-modal-close" id="fr-modal-close">&times;</button>
      <img id="fr-modal-img" src="" alt="" />
      <div class="fr-modal-body">
        <h2 class="fr-modal-title" id="fr-modal-title"></h2>
        <div class="fr-modal-meta" id="fr-modal-meta"></div>
        <div class="fr-modal-desc" id="fr-modal-desc"></div>
      </div>
    </div>
  </div>

  <script>
    // ── Modal helper ──
    function openEventModal(ev)
    {
      const overlay = document.getElementById('fr-modal-overlay');
      const imgEl   = document.getElementById('fr-modal-img');
      const titleEl = document.getElementById('fr-modal-title');
      const metaEl  = document.getElementById('fr-modal-meta');
      const descEl  = document.getElementById('fr-modal-desc');

      titleEl.textContent = ev.title || '';

      if (ev.thumbnail)
      {
        imgEl.src = ev.thumbnail;
        imgEl.alt = ev.title || '';
        imgEl.style.display = 'block';
      }
      else
      {
        imgEl.style.display = 'none';
      }

      // build date/time string
      let meta = '';
      if (ev.start)
      {
        const d = new Date(ev.start);
        meta = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })
             + ' \u2022 '
             + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        if (ev.end)
        {
          const ed = new Date(ev.end);
          meta += ' \u2013 ' + ed.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }
      }
      metaEl.textContent = meta;

      descEl.textContent = ev.description || '';
      descEl.style.display = ev.description ? 'block' : 'none';

      overlay.classList.add('open');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    (function()
    {
      const overlay = document.getElementById('fr-modal-overlay');
      document.getElementById('fr-modal-close').addEventListener('click', () => overlay.classList.remove('open'));
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });
    })();

    // load events + build calendar
    document.addEventListener('DOMContentLoaded', async function ()
    {
      const calendarEl = document.getElementById('fr-events-calendar');
      const debugEl = document.getElementById('fr-debug');

      function setDebug(msg, isError = false)
      {
        if (!debugEl) return;
        debugEl.textContent = msg;
        debugEl.style.color = isError ? '#b00020' : '#333';
        debugEl.style.display = 'block';
      }

      async function loadJsonArray(path)
      {
        try
        {
          const response = await fetch(path, { cache: 'no-store' });
          if (!response.ok)
          {
            if (response.status === 404) return [];
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          return Array.isArray(data) ? data : [];
        }
        catch (err)
        {
          console.error(`Failed to load ${path}`, err);
          return [];
        }
      }

      // merge FareHarbor-synced events with manually managed events
      let events = [];
      try
      {
        const [syncedEvents, manualEvents] = await Promise.all([
          loadJsonArray('./events.json'),
          loadJsonArray('./manual-events.json')
        ]);

        const merged = [...syncedEvents, ...manualEvents];
        const byKey = new Map();

        for (const event of merged)
        {
          if (!event || typeof event !== 'object') continue;

          const title = typeof event.title === 'string' ? event.title.trim() : '';
          const start = typeof event.start === 'string' ? event.start : '';
          if (!title || !start) continue;

          const key =
            (typeof event.id === 'string' && event.id.trim())
              ? `id:${event.id.trim()}`
              : `${title}::${start}::${event.end || ''}`;

          byKey.set(key, event);
        }

        events = Array.from(byKey.values()).sort(
          (a, b) => String(a.start || '').localeCompare(String(b.start || ''))
        );

        // ── render featured grid from upcoming events ──
        const gridEl = document.getElementById('fr-featured-grid');
        if (gridEl && events.length)
        {
          const now = new Date();
          const upcoming = events.filter(e => new Date(e.start) >= now);
          // deduplicate by title so recurring events only show once
          const seen = new Set();
          const unique = [];
          for (const e of upcoming)
          {
            const t = (e.title || '').trim().toLowerCase();
            if (!seen.has(t)) { seen.add(t); unique.push(e); }
          }
          const featured = unique;

          for (const item of featured)
          {
            const card = document.createElement('div');
            card.className = 'fr-featured-card';
            if (item.url) card.addEventListener('click', () => window.open(item.url, '_blank'));
            else card.addEventListener('click', () => openEventModal(item));
            card.style.cursor = 'pointer';

            if (item.thumbnail)
            {
              const img = document.createElement('img');
              img.className = 'fr-featured-card-img';
              img.src = item.thumbnail;
              img.alt = item.title;
              card.appendChild(img);
            }

            const brandColors = [
              getComputedStyle(document.documentElement).getPropertyValue('--brand-pink').trim(),
              getComputedStyle(document.documentElement).getPropertyValue('--brand-blue').trim(),
              getComputedStyle(document.documentElement).getPropertyValue('--brand-green').trim(),
              getComputedStyle(document.documentElement).getPropertyValue('--brand-yellow').trim(),
              getComputedStyle(document.documentElement).getPropertyValue('--brand-orange').trim()
            ];
            const randColor = brandColors[Math.floor(Math.random() * brandColors.length)];

            const body = document.createElement('div');
            body.className = 'fr-featured-card-body';
            body.style.background = randColor;

            const title = document.createElement('div');
            title.className = 'fr-featured-card-title';
            title.textContent = item.title;
            body.appendChild(title);

            const metaRow = document.createElement('div');
            metaRow.className = 'fr-featured-card-subtitle';

            if (item.start)
            {
              const d = new Date(item.start);
              const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
              const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
              let label = dateStr + ' ' + timeStr;
              if (item.end)
              {
                const ed = new Date(item.end);
                label += ' – ' + ed.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
              }
              metaRow.textContent = label;
            }

            body.appendChild(metaRow);
            card.appendChild(body);

            if (item.url)
            {
              const btn = document.createElement('a');
              btn.className = 'fr-featured-card-btn';
              btn.textContent = 'Get Tickets';
              btn.href = item.url;
              btn.target = '_blank';
              btn.addEventListener('click', (e) => e.stopPropagation());
              card.appendChild(btn);
            }
            else
            {
              const btn = document.createElement('span');
              btn.className = 'fr-featured-card-btn';
              btn.textContent = 'More Info';
              card.appendChild(btn);
            }

            gridEl.appendChild(card);
          }
        }
      }

      catch (err)
      {
        console.error('Failed to load calendar data files', err);
        setDebug('Failed to load events. Please try again later.', true);
      }

      // spin up calendar
      const calendar = new FullCalendar.Calendar(calendarEl,
      {
        initialView: 'dayGridMonth',
        height: 'auto',
        events: events,

        // open event link in new tab, or modal for no-URL events
        eventClick: function (info)
        {
          if (info.event.url)
          {
            window.open(info.event.url, '_blank');
            info.jsEvent.preventDefault();
          }
          else
          {
            info.jsEvent.preventDefault();
            const props = info.event.extendedProps;
            openEventModal({
              title: info.event.title,
              start: info.event.start ? info.event.start.toISOString() : '',
              end: info.event.end ? info.event.end.toISOString() : '',
              thumbnail: props.thumbnail || '',
              description: props.description || ''
            });
          }
        },

        // custom event card UI
        eventContent: function (info)
        {
          const props = info.event.extendedProps;
          const thumbnail = props.thumbnail;
          const title = info.event.title;

          // grab color palette from CSS vars
          const palette =
          [
            getComputedStyle(document.documentElement).getPropertyValue('--brand-pink').trim(),
            getComputedStyle(document.documentElement).getPropertyValue('--brand-blue').trim(),
            getComputedStyle(document.documentElement).getPropertyValue('--brand-green').trim(),
            getComputedStyle(document.documentElement).getPropertyValue('--brand-yellow').trim(),
            getComputedStyle(document.documentElement).getPropertyValue('--brand-orange').trim()
          ];

          // pick a random brand color
          const color = palette[Math.floor(Math.random() * palette.length)];

          // build card shell
          const container = document.createElement('div');
          container.className = 'fr-event-card';
          container.style.background =
            `linear-gradient(135deg, ${color} 0%, ${color} 80%, rgba(255,255,255,0.15) 100%)`;

          // add image if we have one
          if (thumbnail)
          {
            const img = document.createElement('img');
            img.src = thumbnail;
            img.alt = title;
            container.appendChild(img);
          }

          // add title
          const titleEl = document.createElement('div');
          titleEl.className = 'fr-event-title';
          titleEl.textContent = title;
          container.appendChild(titleEl);

          // hand back card DOM
          return { domNodes: [container] };
        }
      });

      // render it
      calendar.render();
    });
  </script>
</body>
</html>
