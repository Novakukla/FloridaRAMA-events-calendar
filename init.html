<!-- FloridaRAMA calendar -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

  <!-- fun display font -->
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* brand colors */
    :root
    {
      --brand-pink: #ef779f;
      --brand-blue: #36a8de;
      --brand-green: #3db489;
      --brand-yellow: #f8c964;
      --brand-orange: #f47948;
    }
    /* base layout */
    body
    {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Baloo 2', sans-serif;
      font-size: large;
      color: #333;
    }

    /* hide page scrollbars, let calendar handle scroll */
    html, body
    {
      height: 100%;
      overflow: hidden;
      -ms-overflow-style: none; /* old IE/Edge */
      scrollbar-width: none; /* firefox */
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    .fc-scroller::-webkit-scrollbar
    {
      width: 0;
      height: 0;
      display: none;
    }

    .fc-scroller
    {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    #fr-events-calendar { max-width: 100%; margin: 0 auto; height: 100vh; }

    html,
    body,
    #fr-events-calendar{ height: 100%; }

    /* only show this if loading fails */
    #fr-debug { display: none; }

    /* day cells */
    .fc-daygrid-day-frame
    {
      min-height: 130px; /* card space */
      background-color: #fffdf7;
      border: none;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
      border-radius: 8px;
      padding: 2px;
    }

    .fc-scrollgrid
    {
      border: none;
    }

    .fc-daygrid-day-number
    {
      font-weight: 600;
      color: var(--brand-green);
      margin: 2px;
    }
    /* events in grid */
    .fc-daygrid-day-events
    {
      max-height: none !important;
    }

    .fc-daygrid-event-harness
    {
      height: auto !important;
      margin-bottom: 4px;
    }

    .fc-daygrid-event
    {
      height: auto !important;
      white-space: normal;
      padding: 0;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .fc-daygrid-event:hover
    {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    .fc-daygrid-day-events,
    .fc-daygrid-event-harness,
    .fc-daygrid-event
    {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      margin: 0;
    }
    /* event card content */
    .fr-event-card
    {
      display: flex;
      flex-direction: column;
      font-size: 11px;
      color: #fff;
      width: 100%;
      box-sizing: border-box;
      min-height: 200px;
    }

    .fr-event-card img
    {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .fr-event-title
    {
      padding: 6px;
      font-weight: 600;
      font-size: 15px;
    }

    .fr-event-time
    {
      padding: 0 6px 6px;
      font-size: 12px;
      opacity: 0.9;
    }
    /* highlight today */
    .fc-day-today .fc-daygrid-day-frame
    {
      background: linear-gradient(135deg, rgba(248,201,100,0.35), #fffdf7);
      box-shadow:
        0 0 0 2px rgba(248,201,100,0.9),
        inset 0 0 0 1px rgba(0,0,0,0.06);
    }

    .fc-day-today .fc-daygrid-day-number
    {
      color: var(--brand-pink);
      font-weight: 700;
    }
    /* mobile: image-only cards */
    @media (max-width: 600px)
    {
      .fc-daygrid-day-frame { min-height: auto; padding: 2px; }

      .fc-daygrid-day-events { max-height: none !important; }

      .fc-daygrid-event-harness { height: auto !important; }

      .fc-daygrid-event { height: auto !important; }

      .fr-event-title, .fr-event-time { display: none; }

      .fr-event-card
      {
        aspect-ratio: 1 / 1;
        padding: 0;
        min-height: 0;
      }

      .fr-event-card img
      {
        width: 100%;
        height: 100%;
        max-height: none;
        object-fit: cover;
        display: block;
      }
    }
  </style>
</head>

<body>
  <div id="fr-events-calendar"></div>
  <div id="fr-debug" style="font-size:12px;padding:6px 8px;color:#333;"></div>

  <script>
    // load events + build calendar
    document.addEventListener('DOMContentLoaded', async function ()
    {
      const calendarEl = document.getElementById('fr-events-calendar');
      const debugEl = document.getElementById('fr-debug');

      function setDebug(msg, isError = false)
      {
        if (!debugEl) return;
        debugEl.textContent = msg;
        debugEl.style.color = isError ? '#b00020' : '#333';
        debugEl.style.display = 'block';
      }

      // events from local json
      let events = [];
      try
      {
        const response = await fetch('./events.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        events = await response.json();
      }
      catch (err)
      {
        console.error('Failed to load ./events.json', err);
        setDebug('Failed to load events. Please try again later.', true);
      }

      // spin up calendar
      const calendar = new FullCalendar.Calendar(calendarEl,
      {
        initialView: 'dayGridMonth',
        height: '100%',
        events: events,

        // open event link in new tab
        eventClick: function (info)
        {
          if (info.event.url)
          {
            window.open(info.event.url, '_blank');
            info.jsEvent.preventDefault();
          }
        },

        // custom event card UI
        eventContent: function (info)
        {
          const props = info.event.extendedProps;
          const thumbnail = props.thumbnail;
          const title = info.event.title;

          // grab color palette from CSS vars
          const palette =
          [
            getComputedStyle(document.documentElement).getPropertyValue('--brand-pink').trim(),
            getComputedStyle(document.documentElement).getPropertyValue('--brand-blue').trim(),
            getComputedStyle(document.documentElement).getPropertyValue('--brand-green').trim(),
            getComputedStyle(document.documentElement).getPropertyValue('--brand-yellow').trim(),
            getComputedStyle(document.documentElement).getPropertyValue('--brand-orange').trim()
          ];

          // pick a random brand color
          const color = palette[Math.floor(Math.random() * palette.length)];

          // build card shell
          const container = document.createElement('div');
          container.className = 'fr-event-card';
          container.style.background =
            `linear-gradient(135deg, ${color} 0%, ${color} 80%, rgba(255,255,255,0.15) 100%)`;

          // add image if we have one
          if (thumbnail)
          {
            const img = document.createElement('img');
            img.src = thumbnail;
            img.alt = title;
            container.appendChild(img);
          }

          // add title
          const titleEl = document.createElement('div');
          titleEl.className = 'fr-event-title';
          titleEl.textContent = title;
          container.appendChild(titleEl);

          // hand back card DOM
          return { domNodes: [container] };
        }
      });

      // render it
      calendar.render();
    });
  </script>
</body>
</html>
